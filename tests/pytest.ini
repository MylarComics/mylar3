[pytest]
verbosity_assertions = 2
addopts = --no-header --tb=short -rfExXs
markers =
    bench: Tests for benchmarking (deselect with '-m "not bench"')
    unit: marks tests as unit tests
    integration: mark tests as integration tests
# Temporary while testing pytest - should reveal these and aim to resolve in upgrade
filterwarnings =
    ignore:invalid escape sequence:DeprecationWarning
    ignore:.*slated for removal:DeprecationWarning